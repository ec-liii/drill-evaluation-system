<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Drill Nursery TV Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socketio.org/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-black text-emerald-400 font-mono h-screen flex flex-col justify-between p-8">

    <div class="border-b border-emerald-800 pb-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-widest text-emerald-500">// SECUREEYE RADAR DISP</h1>
        <div id="connection-status" class="text-xs bg-emerald-950 px-3 py-1 rounded border border-emerald-700 animate-pulse">CONNECTED TO PIPELINE</div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center my-10">
        <div class="text-center">
            <p class="text-xs text-emerald-600 tracking-widest uppercase mb-2">Active Telemetry Readout</p>
            <div id="telemetry-display" class="text-2xl md:text-5xl font-black text-white tracking-tight transition-all duration-100">
                Awaiting System Command Codes
            </div>
        </div>
    </div>

    <div class="border-t border-emerald-800 pt-4 flex justify-between text-xs text-emerald-600">
        <div>SYS_MODE: LIVE_INFERENCE_THREADING</div>
        <div>TARGET_INDEX: CAP_DSHOW [0]</div>
    </div>

    <script>
        const socket = io();

        socket.on('live_telemetry', function(data) {
            const display = document.getElementById('telemetry-display');
            if (data.metrics) {
                let displayString = "";
                for (const [key, value] of Object.entries(data.metrics)) {
                    displayString += `${key}: <span class="text-emerald-400">${value}</span> | `;
                }
                display.innerHTML = displayString.slice(0, -3);
            }
        });

        socket.on('disconnect', function() {
            document.getElementById('connection-status').innerText = "DISCONNECTED";
            document.getElementById('connection-status').className = "text-xs bg-rose-950 px-3 py-1 rounded border border-rose-700 text-rose-400";
        });
    </script>
</body>
</html>
