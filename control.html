<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drill Action Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socketio.org/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 flex flex-col items-center justify-center min-h-screen text-white">
    
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl flex flex-col items-center w-96 border border-slate-700">
        <h1 class="text-2xl font-black tracking-tight uppercase border-b-2 border-slate-600 pb-2 mb-8 text-center text-blue-400 initialize">
            {{ drill_type.replace('_',' ') }} Panel
        </h1>
        
        <div class="flex flex-col space-y-4 w-full">
            <button onclick="sendAction('start')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg transition active:scale-95">
                Start Tracking
            </button>
            <button onclick="sendAction('stop')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg transition active:scale-95">
                Stop Tracking
            </button>
            
            <a id="pdf-download-link" href="#" class="hidden text-center bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-3 rounded-xl transition shadow-md">
                Download PDF Report
            </a>
            
            <a href="/" class="text-center bg-slate-600 hover:bg-slate-50 text-white hover:text-slate-900 py-2 rounded-xl transition text-sm font-medium">
                Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const socket = io();

        function sendAction(action) {
            fetch(`/api/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ drill_type: "{{ drill_type }}" })
            })
            .then(res => res.json())
            .then(data => console.log("Engine Handshake Output:", data))
            .catch(err => console.error("API Transmission Error:", err));
        }

        socket.on('new_pdf_ready', function(data) {
            const targetButton = document.getElementById('pdf-download-link');
            targetButton.href = data.pdf_url;
            targetButton.classList.remove('hidden');
        });
    </script>
</body>
</html>
